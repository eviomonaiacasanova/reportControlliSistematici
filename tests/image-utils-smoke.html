<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <title>Image utilities smoke test</title>
</head>
<body>
  <pre id="result">RUNNING</pre>
  <script src="../libs/jspdf.umd.min.js"></script>
  <script src="../js/image-utils.js"></script>
  <script>
    function makeBmpDataUrl(width, height) {
      const rowSize = Math.ceil((width * 3) / 4) * 4;
      const pixelSize = rowSize * height;
      const bytes = new Uint8Array(54 + pixelSize);
      const view = new DataView(bytes.buffer);

      bytes[0] = 0x42;
      bytes[1] = 0x4d;
      view.setUint32(2, bytes.length, true);
      view.setUint32(10, 54, true);
      view.setUint32(14, 40, true);
      view.setInt32(18, width, true);
      view.setInt32(22, height, true);
      view.setUint16(26, 1, true);
      view.setUint16(28, 24, true);
      view.setUint32(34, pixelSize, true);

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const offset = 54 + (y * rowSize) + (x * 3);
          bytes[offset] = x * 20;
          bytes[offset + 1] = y * 30;
          bytes[offset + 2] = 200;
        }
      }

      let binary = "";
      for (let offset = 0; offset < bytes.length; offset += 0x8000) {
        binary += String.fromCharCode(...bytes.subarray(offset, offset + 0x8000));
      }
      return `data:image/bmp;base64,${btoa(binary)}`;
    }

    (async () => {
      const result = document.getElementById("result");
      try {
        const landscape = ReportImages.fitWithin(4000, 3000, 1280, 1280);
        const portrait = ReportImages.fitWithin(3000, 4000, 1280, 1280);
        if (landscape.width !== 1280 || landscape.height !== 960) throw new Error("fit landscape");
        if (portrait.width !== 960 || portrait.height !== 1280) throw new Error("fit portrait");

        const bmpDataUrl = makeBmpDataUrl(1600, 800);
        const sourceBytes = ReportImages.estimateDataUrlBytes(bmpDataUrl);
        const photo = await ReportImages.optimizeDataUrl(bmpDataUrl, "test.bmp");
        if (!photo.dataUrl.startsWith("data:image/jpeg")) throw new Error("BMP non convertito");
        if (photo.width !== 1280 || photo.height !== 640) throw new Error("proporzioni BMP errate");
        if (photo.sizeBytes >= sourceBytes / 2) throw new Error("compressione insufficiente");

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "mm", format: "a4", compress: true });
        const properties = doc.getImageProperties(photo.dataUrl);
        if (properties.width !== 1280 || properties.height !== 640) throw new Error("dimensioni PDF errate");
        doc.addImage(photo.dataUrl, "JPEG", 10, 10, 100, 50, undefined, "FAST");
        const pdfBytes = doc.output("arraybuffer").byteLength;
        if (pdfBytes < 1000) throw new Error("PDF non generato");

        result.textContent = `PASS BMP ${sourceBytes} B -> JPEG ${photo.sizeBytes} B ${photo.width}x${photo.height} -> PDF ${pdfBytes} B`;
      } catch (error) {
        result.textContent = `FAIL ${error.message}`;
      }
    })();
  </script>
</body>
</html>
